<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Top-Down Co-op Puzzle</title>
    <style>
      body { background-color: #111; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
      #game-container { position: relative; width: 800px; height: 600px; background: #000; }

      #login-ui {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 100; color: white; font-family: sans-serif;
      }

      h1 { margin-bottom: 30px; font-size: 32px; text-shadow: 2px 2px 4px #000; }

      input {
        padding: 12px; font-size: 18px; width: 260px;
        border-radius: 8px; border: 2px solid #00ff00;
        background: #222; color: white; text-align: center; margin-bottom: 15px;
      }

      #login-button {
        padding: 15px 40px; font-size: 20px; cursor: pointer;
        background-color: #00ff00; color: #000; border: none;
        border-radius: 8px; font-weight: bold; transition: 0.2s;
      }
      #login-button:hover { background-color: #fff; transform: scale(1.05); }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="login-ui">
        <h1>Team HIGH five Puzzle</h1>
        <input type="text" id="name-input" placeholder="이름을 입력하세요" />
        <input type="number" id="group-input" placeholder="모둠 번호 (숫자만)" />
        <button id="login-button">게임 접속</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
